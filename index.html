<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Tetris - 네온 에디션</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mobile-header glass">
        <div class="header-stat">LV <span id="m-level">1</span></div>
        <div class="header-stat">SCORE <span id="m-score">0</span></div>
        <div class="header-stat">LINES <span id="m-lines">0</span></div>
        <div class="header-stat">NEXT
            <canvas id="m-next-piece" width="40" height="40"></canvas>
        </div>
        <button id="btn-pause" class="ctrl-btn glass">❚❚</button>
    </div>
    <div class="game-container">
        <div class="side-panel left">
            <div class="stat-box glass">
                <h2>LEVEL</h2>
                <div id="level">1</div>
            </div>
            <div class="stat-box glass">
                <h2>SCORE</h2>
                <div id="score">0</div>
            </div>
            <div class="stat-box glass">
                <h2>LINES</h2>
                <div id="lines">0</div>
            </div>
        </div>

        <div class="board-container glass">
            <canvas id="tetris-board" width="300" height="600"></canvas>
            
            <div id="start-screen" class="overlay">
                <div class="overlay-content glass">
                    <h1>NEON TETRIS</h1>
                    <p>고전의 재해석, 최고의 몰입감</p>
                    <button id="start-btn" class="primary-btn">게임 시작 (S)</button>
                </div>
            </div>

            <div id="game-over" class="overlay hidden">
                <div class="overlay-content glass">
                    <h1>GAME OVER</h1>
                    <p>최종 점수: <span id="final-score">0</span></p>
                    
                    <div id="rank-input-area" class="input-group">
                        <input type="text" id="player-name" placeholder="이름을 입력하세요" maxlength="10">
                        <button id="submit-score-btn">기록 저장</button>
                    </div>

                    <div id="high-scores" class="high-scores-list">
                        <h3>TOP 10 RANKING</h3>
                        <ul id="score-list"></ul>
                    </div>

                    <button id="restart-btn">다시 시작 (R)</button>
                </div>
            </div>
            <div id="pause-overlay" class="overlay hidden">
                <div class="overlay-content glass">
                    <h1>PAUSED</h1>
                    <p>계속하려면 P를 누르세요</p>
                </div>
            </div>
        </div>

        <div class="side-panel right">
            <div class="stat-box glass">
                <h2>NEXT</h2>
                <canvas id="next-piece" width="120" height="120"></canvas>
            </div>
            <div class="controls-guide glass desktop-only">
                <h3>조작법</h3>
                <ul>
                    <li><span>← →</span> : 이동</li>
                    <li><span>↑</span> : 회전</li>
                    <li><span>↓</span> : 빠르게 내리기</li>
                    <li><span>Space</span> : 하드 드롭</li>
                    <li><span>P</span> : 일시 정지</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 모바일 전용 컨트롤러 (Mobile Only Controls) -->
    <div class="mobile-controls">
        <div class="control-row">
            <div class="d-pad">
                <button id="btn-left" class="ctrl-btn">←</button>
                <button id="btn-down" class="ctrl-btn">↓</button>
                <button id="btn-right" class="ctrl-btn">→</button>
            </div>
            <div class="action-btns">
                <button id="btn-up" class="ctrl-btn rotate-btn">↻</button>
                <button id="btn-hard" class="ctrl-btn drop-btn">DROP</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
